<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Photography Gallery</title>

<script src="https://cdn.tailwindcss.com"></script>

<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-neutral-50 text-neutral-900 antialiased selection:bg-neutral-200"
x-data="{
lightboxIndex: null,
favorites: new Set(),

/* PASTE YOUR GOOGLE DRIVE IMAGE IDs HERE.
Replace the placeholder IDs (like '1A2b3C...') with your actual Google Drive File IDs.
*/
images: [
{ id: '1', name: 'Ceremony-001.jpg', driveId: '1A2b3C4d5E6f7G8h9I0j1K2l3M4n5O6pP' },
{ id: '2', name: 'Ceremony-002.jpg', driveId: '1z2y3x4w5v6u7t8s9r0q1p2o3n4m5l6kK' },
{ id: '3', name: 'Portrait-001.jpg', driveId: '1aB2cC3dD4eE5fF6gG7hH8iI9jJ0kK1lL' },
{ id: '4', name: 'Reception-001.jpg', driveId: '1_A2-B3_C4-D5_E6-F7_G8-H9_I0-J1_K2' }
 ],

// Helper function to turn a standard Google Drive ID into a clean web image link
getDriveUrl(driveId) {
return https://lh3.googleusercontent.com/d/${driveId};
},

toggleFavorite(id) {
this.favorites.has(id) ? this.favorites.delete(id) : this.favorites.add(id);
}
}"
@keydown.window.escape="lightboxIndex = null"
@keydown.window.arrow-right="if (lightboxIndex !== null) lightboxIndex = (lightboxIndex + 1) % images.length"
@keydown.window.arrow-left="if (lightboxIndex !== null) lightboxIndex = (lightboxIndex - 1 + images.length) % images.length">

<header class="max-w-7xl mx-auto px-6 pt-24 pb-16 text-center">
<span class="text-xs uppercase tracking-widest text-neutral-400 font-semibold">Client Presentation</span>
<h1 class="text-4xl md:text-5xl font-light tracking-tight mt-2 text-neutral-800">The Story of Today</h1>
<p class="text-sm text-neutral-500 mt-3 italic font-serif">Curated Collection</p>

<div class="flex justify-center gap-6 mt-8 text-xs tracking-wider text-neutral-500 uppercase border-t border-b border-neutral-200/60 py-3 max-w-sm mx-auto">
<span x-text="images.length + ' Photos'"></span>
<span class="text-neutral-300">|</span>
<span x-text="favorites.size + ' Favorited'"></span>
</div>
</header>

<main class="max-w-7xl mx-auto px-4 sm:px-6 pb-24">
<div class="columns-1 sm:columns-2 md:columns-3 lg:columns-4 gap-4 space-y-4">
<template x-for="(image, index) in images" :key="image.id">
<div @click="lightboxIndex = index"
class="break-inside-avoid group relative overflow-hidden bg-neutral-200 rounded-sm cursor-zoom-in transition-all duration-300 hover:shadow-xl">

<img :src="getDriveUrl(image.driveId)"
:alt="image.name"
loading="lazy"
class="w-full h-auto object-cover transition-transform duration-700 ease-out group-hover:scale-105" />

<div class="absolute inset-0 bg-gradient-to-t from-black/50 via-transparent to-black/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-between p-4 z-10">
<div class="flex justify-end">
<button @click.stop="toggleFavorite(image.id)"
class="p-2 rounded-full bg-white/10 hover:bg-white/20 backdrop-blur-md text-white transition-colors">
<svg xmlns="http://www.w3.org/2000/svg" :fill="favorites.has(image.id) ? 'currentColor' : 'none'" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
<path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
</svg>
</button>
</div>
<p class="text-xs text-neutral-200 font-mono tracking-wide truncate" x-text="image.name"></p>
</div>
</div>
</template>
</div>
</main>

<div class="fixed inset-0 z-50 bg-neutral-950/95 backdrop-blur-sm flex items-center justify-center select-none"
x-show="lightboxIndex !== null"
style="display: none;"
@click="lightboxIndex = null">

<div class="absolute top-0 inset-x-0 h-20 flex items-center justify-between px-6 bg-gradient-to-b from-black/60 to-transparent text-white z-10">
<span class="text-xs font-mono tracking-wider text-neutral-300"
x-text="(lightboxIndex + 1) + ' / ' + images.length + ' — ' + images[lightboxIndex]?.name">
</span>
<div class="flex items-center gap-6">
<button @click.stop="toggleFavorite(images[lightboxIndex].id)" class="text-neutral-300 hover:text-white transition-colors">
<svg xmlns="http://www.w3.org/2000/svg" :fill="favorites.has(images[lightboxIndex]?.id) ? 'currentColor' : 'none'" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
<path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
</svg>
</button>
<button @click="lightboxIndex = null" class="text-xs uppercase tracking-widest text-neutral-400 hover:text-white transition-colors">Close ✕</button>
</div>
</div>

<button @click.stop="lightboxIndex = (lightboxIndex - 1 + images.length) % images.length"
class="absolute left-6 p-4 rounded-full text-neutral-400 hover:text-white bg-neutral-900/30 hover:bg-neutral-800/60 backdrop-blur-sm transition-all z-20 text-2xl">‹</button>

<button @click.stop="lightboxIndex = (lightboxIndex + 1) % images.length"
class="absolute right-6 p-4 rounded-full text-neutral-400 hover:text-white bg-neutral-900/30 hover:bg-neutral-800/60 backdrop-blur-sm transition-all z-20 text-2xl">›</button>

<div class="relative max-w-5xl max-h-[85vh] w-full h-full p-4 flex items-center justify-center">
<img :src="getDriveUrl(images[lightboxIndex]?.driveId)"
:alt="images[lightboxIndex]?.name"
class="max-w-full max-h-full object-contain shadow-2xl pointer-events-none" />
</div>
</div>

</body>
</html>
